{% extends "base.html" %}

{% block title %}Update Password | Emotion Insights Hub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-6 py-12">
    <div
        class="w-full max-w-lg bg-surface border border-border rounded-2xl p-10 shadow-xl relative overflow-hidden animate-fade-in-up">
        <div class="relative z-10">
            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-600/20 transition-transform hover:scale-110">
                    <i class="fas fa-shield-alt text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-primary mb-2 tracking-tight">Identity Recovery</h1>
                <p class="text-slate-500 text-sm font-medium">Define your new secure access credentials</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password', token=token) }}" id="reset-form" class="space-y-6">
                <!-- New Password -->
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest pl-1">New
                        Password</label>
                    <div class="relative group">
                        <i
                            class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="password" name="password" id="password" required placeholder="••••••••"
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border border-border rounded-xl py-3.5 pl-11 pr-11 text-primary placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-all font-medium text-sm">
                        <button type="button"
                            class="toggle-pwd absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                    <!-- Strength Hook -->
                    <div class="pt-2 px-1">
                        <div
                            class="h-1 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden flex gap-0.5">
                            <div
                                class="str-seg h-full w-1/4 bg-slate-200 dark:bg-slate-600 transition-all duration-300">
                            </div>
                            <div
                                class="str-seg h-full w-1/4 bg-slate-200 dark:bg-slate-600 transition-all duration-300">
                            </div>
                            <div
                                class="str-seg h-full w-1/4 bg-slate-200 dark:bg-slate-600 transition-all duration-300">
                            </div>
                            <div
                                class="str-seg h-full w-1/4 bg-slate-200 dark:bg-slate-600 transition-all duration-300">
                            </div>
                        </div>
                        <div id="strength-text"
                            class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mt-2">Strength: Enter
                            password</div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest pl-1">Confirm New
                        Password</label>
                    <div class="relative group">
                        <i
                            class="fas fa-check-circle absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="password" id="confirm_password" required placeholder="••••••••"
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border border-border rounded-xl py-3.5 pl-11 pr-11 text-primary placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-all font-medium text-sm">
                        <button type="button"
                            class="toggle-pwd absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <div id="error-box"
                    class="hidden bg-rose-50 border border-rose-100 text-rose-600 py-3 rounded-xl text-center text-xs font-bold uppercase tracking-widest">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                    Update Password <i class="fas fa-sync-alt text-[10px]"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const segments = document.querySelectorAll('.str-seg');
    const strengthText = document.getElementById('strength-text');
    const errorBox = document.getElementById('error-box');

    document.querySelectorAll('.toggle-pwd').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = btn.parentElement.querySelector('input');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            btn.querySelector('i').className = type === 'password' ? 'fas fa-eye text-xs' : 'fas fa-eye-slash text-xs';
        });
    });

    password.addEventListener('input', () => {
        const val = password.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['bg-rose-500', 'bg-orange-500', 'bg-yellow-500', 'bg-emerald-500', 'bg-blue-500'];
        const labels = ['Weak', 'Fair', 'Strong', 'Very Strong', 'Optimal'];

        segments.forEach((seg, i) => {
            seg.className = `str-seg h-full w-1/4 transition-all duration-300 ${i < score ? colors[score] : 'bg-slate-200 dark:bg-slate-600'}`;
        });
        strengthText.innerText = `Strength: ${labels[score] || 'Enter password'}`;
        strengthText.className = `text-[9px] font-bold uppercase tracking-widest mt-2 ${score > 0 ? colors[score].replace('bg-', 'text-') : 'text-slate-400'}`;
    });

    document.getElementById('reset-form').onsubmit = (e) => {
        errorBox.classList.add('hidden');
        if (password.value !== confirm.value) {
            e.preventDefault();
            errorBox.innerText = "Passwords do not match";
            errorBox.classList.remove('hidden');
            return;
        }
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;
    };
</script>
{% endblock %}
