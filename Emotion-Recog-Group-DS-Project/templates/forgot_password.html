{% extends "base.html" %}

{% block title %}Reset Password | Emotion Insights Hub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-6 py-12">
    <div
        class="w-full max-w-lg bg-surface border border-border rounded-2xl p-10 shadow-xl relative overflow-hidden animate-fade-in-up text-center">
        <div
            class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-xl flex items-center justify-center mx-auto mb-6 text-blue-600">
            <i class="fas fa-key text-2xl"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-primary mb-2 tracking-tight">Identity Recovery</h1>
        <p class="text-slate-500 text-sm font-medium mb-10">Enter your email and we'll send you a recovery link</p>

        <form id="forgot-form" class="space-y-6 text-left">
            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest pl-1">Work Email</label>
                <div class="relative group">
                    <i
                        class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="email" name="email" required placeholder="alex.murphy@company.com"
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-border rounded-xl py-3.5 pl-11 pr-4 text-primary placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-all font-medium text-sm">
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                Send Recovery Link <i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </form>

        <div id="status-box"
            class="hidden mt-8 p-4 rounded-xl text-xs font-bold uppercase tracking-widest animate-fade-in"></div>

        <div class="mt-8 pt-6 border-t border-border">
            <a href="{{ url_for('auth.login_page') }}"
                class="inline-flex items-center gap-2 text-slate-400 hover:text-primary transition-colors text-[10px] font-bold uppercase tracking-widest group">
                <i class="fas fa-chevron-left group-hover:-translate-x-1 transition-transform"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('forgot-form').onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const btn = document.getElementById('submit-btn');
        const statusBox = document.getElementById('status-box');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        statusBox.classList.add('hidden');

        try {
            const res = await fetch('/forgot-password', { method: 'POST', body: fd });
            const data = await res.json();

            statusBox.classList.remove('hidden');
            statusBox.innerText = data.message;
            if (data.status === 'success') {
                statusBox.className = "mt-8 p-4 rounded-xl text-xs font-bold uppercase tracking-widest bg-emerald-50 border border-emerald-100 text-emerald-600";
            } else {
                statusBox.className = "mt-8 p-4 rounded-xl text-xs font-bold uppercase tracking-widest bg-rose-50 border border-rose-100 text-rose-600";
            }
        } catch (err) {
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Send Recovery Link <i class="fas fa-paper-plane text-[10px]"></i>';
        }
    };
</script>
{% endblock %}
